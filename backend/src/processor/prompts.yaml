# AI 处理 Prompt 模板

summarize: |
  请用一句话（30-50字）总结以下科技/AI文章的核心内容。要求：
  - 用中文
  - 突出关键信息（产品名、数据、突破点等）
  - 不要加标题，直接输出摘要
  - 不要用"这篇文章介绍了"等套话
  - 像朋友聊天一样自然

  文章标题：{title}
  文章内容：{content}

keywords: |
  请从以下文章中提取 3-5 个关键词。要求：
  - 用中文
  - 关键词应是技术名词、产品名、公司名等实体
  - 以 JSON 数组格式输出，例如：["关键词1", "关键词2"]
  - 不要输出其他内容

  已有词库（避免重复）：{existing_keywords}

  文章标题：{title}
  文章内容：{content}

scoring: |
  请对以下科技/AI文章的信息价值进行打分（0.0 到 1.0）。
  打分标准：
  - 0.9-1.0: 重大发布（新模型发布、重大技术突破）
  - 0.7-0.9: 重要进展（大公司产品/开源项目的重大更新）
  - 0.5-0.7: 有价值但不重大的内容
  - 0.0-0.5: 常规更新或价值较低

  我们每天只选 7-10 条最好的，所以请严格打分。
  只输出数字，不要其他内容。

  文章标题：{title}
  文章摘要：{summary}

dedup: |
  请判断以下文章是否与已有文章重复。
  判断标准：
  - 同一事件的重复报道
  - 内容高度相似（>70%）
  - 只是来源不同但讲同一件事

  输出 "DUPLICATE" 或 "UNIQUE"，不要输出其他内容。

  新文章标题：{new_title}
  新文章摘要：{new_summary}

  已有文章：
  {existing_articles}

generate_digest: |
  你是"每日 AI 科技简报"的主编。请根据以下文章列表，
  为今天的科技简报撰写内容。

  写作风格要求：
  - 口语化，像在和朋友聊
  - 每条包含：标题（精简）+ 1-2段描述（80-150字）+ 个人观点
  - 个人观点用"我觉得..."、"值得关注的是..."、"有意思的是..."等
  - 描述要丰富，不要只是一句话，要把事情讲清楚
  - 有数据、有人名、有背景，让内容立体
  - 保留原文链接
  - 用中文写作
  - 如果有图片链接，在标题下方插入图片

  请按以下格式输出 Markdown：

  ## {category_name}

  **{title}**

  [图片链接如果有]

  {description 1-2段，内容丰富，带个人观点}

  [原文链接]({url})

  文章列表（包含 title, url, summary, image_url, source, content）：
  {articles}

generate_broadcast_script: |
  你是一位专业的 AI 科技播客主持人。
  请根据今天的 AI 早报内容，撰写一段广播稿。

  风格要求：
  - 口语化，像在给朋友讲今天的科技新闻
  - 开头有一段开场白（100-150字），介绍今天的整体情况
  - 每条新闻 2-3 句话，把事情讲清楚
  - 中间穿插个人观点，如"我觉得..."、"有意思的是..."
  - 结尾有一段总结（50-80字），概括今天的关键趋势
  - 全程用中文

  输出格式：以 JSON 数组输出，每项是一个段落。
  第一项是开场白，中间是各条新闻，最后是总结。
  例如：["今天大家好，我是xxx...", "第一条新闻...", "第二条新闻...", "今天就这样，明天见！"]

  文章列表：
  {articles}

generate_item_script: |
  你是一位科技播客主持人。请将以下文章信息改写为一段口语化的播报。

  要求：
  - 2-3 句话，把事情讲清楚
  - 用中文
  - 自然流畅，像朋友聊天
  - 不要加"第一条"、"第二条"之类的编号词

  标题：{title}
  摘要：{summary}
  关键词：{keywords}

generate_title: |
  你正在编辑一份每日 AI 早报。
  请为以下内容生成一个简洁的标题（不超过20字）。
  要求：抓人眼球，突出关键信息。

  原标题：{original_title}
  摘要：{summary}
